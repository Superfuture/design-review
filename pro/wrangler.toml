name = "design-review-pro"
main = "src/index.js"
compatibility_date = "2026-05-27"

# License store. The `id` is filled in by:  npx wrangler kv namespace create LICENSES
[[kv_namespaces]]
binding = "LICENSES"
id = "52466658f2af435e82949d9224b4df91"

# Email waitlist signups to you (reuses officialjp.com Email Routing + verified destination).
[vars]
FROM_ADDRESS = "forms@officialjp.com"
TO_ADDRESS = "jprimiani@gmail.com"
# Where Stripe sends buyers after payment (the activate.html page lives here).
LANDING_URL = "https://crit.officialjp.com"
# Stripe price for the $12 one-time Crit Pro product (not secret; safe in config).
# Must match the mode of STRIPE_SECRET_KEY (test price ↔ sk_test, live price ↔ sk_live).
STRIPE_PRICE_ID = "price_0TehXw7m9oR12w1tnjIJUn9W"

[[send_email]]
name = "EMAIL"
destination_address = "jprimiani@gmail.com"

# Secrets (NOT committed) — set with wrangler:
#   npx wrangler secret put STRIPE_SECRET_KEY      # sk_live_... (or sk_test_... to dry-run)
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET  # whsec_... from the Stripe webhook endpoint
#   npx wrangler secret put ANTHROPIC_API_KEY      # optional, enables /report
# (STRIPE_PRICE_ID is a plain var above, not a secret.)
